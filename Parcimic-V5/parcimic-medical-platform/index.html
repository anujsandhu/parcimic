<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Parcimic - Professional Medical Assistance Platform powered by Grooveat">
    <title>Parcimic | Medical Platform by Grooveat</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons -->
    <link rel="icon" href="assets/logos/parcimic-logo.svg">
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Local CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
    <!-- Loading Screen -->
    <div id="app-loading">
        <div class="loading-content">
            <div class="loading-logo">
                <div class="logo-container">
                    <img src="assets/logos/parcimic-logo.svg" alt="Parcimic Logo" class="main-logo">
                    <div class="powered-by">
                        <span>Powered by</span>
                        <img src="assets/logos/grooveat-logo.svg" alt="Grooveat Logo" class="grooveat-logo">
                    </div>
                </div>
            </div>
            <p class="loading-text">Initializing Professional Medical Assistance Platform...</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <!-- Main Content Container -->
    <div id="page-content">
        <!-- Content will be loaded here dynamically -->
    </div>

    <!-- Common Scripts -->
    <script src="api/firebase-config.js"></script>
    <script src="script.js"></script>
    
    <!-- PWA Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registered:', registration);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
