<div class="main-content container">
    <div class="profile-section">
        <div class="profile-header">
            <div class="profile-avatar-large" id="profileAvatarLarge">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-info">
                <h2 id="profileName">Guest User</h2>
                <p id="profileEmail">Sign in to access profile</p>
            </div>
        </div>
        
        <div class="profile-actions">
            <div class="profile-action" onclick="viewProfile()">
                <i class="fas fa-user-edit"></i>
                <span>Edit Profile</span>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="profile-action" onclick="showHealthRecords()">
                <i class="fas fa-file-medical"></i>
                <span>Health Records</span>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="profile-action" onclick="viewSettings()">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="profile-action" onclick="openEmergencyModal()">
                <i class="fas fa-phone-medical"></i>
                <span>Emergency Contacts</span>
                <i class="fas fa-chevron-right"></i>
            </div>
            <div class="profile-action" onclick="signOut()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Sign Out</span>
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>
    </div>
</div>
