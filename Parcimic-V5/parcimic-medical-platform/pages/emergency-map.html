<div class="main-content container">
    <div class="section-header">
        <h2><i class="fas fa-map-marked-alt"></i> Medical Facilities Locator</h2>
        <p>Real-time mapping of hospitals, pharmacies, and clinics across India</p>
    </div>
    
    <div class="map-container">
        <div class="map-controls">
            <button class="map-btn btn-location" onclick="app.getUserLocation()">
                <i class="fas fa-location-dot"></i> Use My Location
            </button>
            <button class="map-btn btn-emergency" onclick="openEmergencyModal()">
                <i class="fas fa-phone-medical"></i> Call 112
            </button>
            <div class="range-selector">
                <label>Search Radius:</label>
                <input type="range" id="rangeSlider" min="1" max="50" value="10">
                <span id="rangeValue">10 km</span>
            </div>
        </div>
        
        <div id="map"></div>
    </div>
</div>
