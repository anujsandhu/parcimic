<div class="main-content container">
    <div class="section-header">
        <h2><i class="fas fa-robot"></i> PulseAI Medical Assistant</h2>
        <p>Get instant medical guidance and symptom analysis</p>
    </div>
    
    <div class="ai-section">
        <div class="ai-features-grid">
            <div class="ai-feature-card">
                <div class="ai-feature-icon">
                    <i class="fas fa-brain"></i>
                </div>
                <h4>Symptom Checker</h4>
                <p>AI-powered preliminary assessment</p>
            </div>
            <div class="ai-feature-card">
                <div class="ai-feature-icon">
                    <i class="fas fa-first-aid"></i>
                </div>
                <h4>First Aid Guide</h4>
                <p>Emergency protocols & instructions</p>
            </div>
            <div class="ai-feature-card">
                <div class="ai-feature-icon">
                    <i class="fas fa-prescription"></i>
                </div>
                <h4>Medication Info</h4>
                <p>Drug information & interactions</p>
            </div>
        </div>
        
        <div class="chat-buttons">
            <button class="btn btn-primary btn-large" id="startChatBtn">
                <i class="fas fa-comment-medical"></i> Start AI Consultation
            </button>
            <button class="btn btn-accent btn-large" onclick="openPulseAI()">
                <i class="fas fa-external-link-alt"></i> Open Medical Chatbot
            </button>
        </div>
    </div>
</div>
